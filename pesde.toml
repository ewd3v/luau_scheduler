name = "ewdev/scheduler"
version = "0.1.1"
description = "A hierarchical, dependency-sorted scheduler for Luau"
authors = ["EwDev (https://ewdev.net/)"]
repository = "https://github.com/ewd3v/luau_scheduler"
license = "MIT"
includes = ["pesde.toml", "README.md", "LICENSE", "src/**/*.luau", "docs/**"]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dev_dependencies]
lute_std_lint = { name = "ewdev/lute_std_lint", version = "^0.1.0", target = "luau" }
